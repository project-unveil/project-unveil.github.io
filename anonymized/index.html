<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNVEIL — Anonymized G1 Trajectories</title>
  <meta name="description" content="Anonymized G1 trajectories produced by the UNVEIL operator-aware anonymizer." />
  <meta name="robots" content="noindex, nofollow" />

  <link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg" />

  <!-- highlight.js: GitHub-style syntax highlighting (used for plaintext line numbering) -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />

  <link rel="stylesheet" href="./assets/browser.css" />
</head>
<body>

<header class="cb-header">
  <a class="cb-back" href="../" title="Back to project page" aria-label="Back to project page">
    <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true" width="14" height="14">
      <path d="M7.78 12.53a.75.75 0 0 1-1.06 0L2.47 8.28a.75.75 0 0 1 0-1.06l4.25-4.25a.75.75 0 1 1 1.06 1.06L4.81 7H13a.75.75 0 0 1 0 1.5H4.81l2.97 2.97a.75.75 0 0 1 0 1.06z"/>
    </svg>
    <span>UNVEIL</span>
  </a>

  <nav class="cb-breadcrumb" id="cb-breadcrumb" aria-label="Path"></nav>
</header>

<main class="cb-main">
  <aside class="cb-tree-pane" aria-label="File tree">
    <div class="cb-tree-header">
      <span class="cb-tree-title">Anonymized G1</span>
      <button class="cb-tree-collapse" id="cb-collapse-all" title="Collapse all folders" aria-label="Collapse all folders">
        <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true" width="12" height="12">
          <path d="M3.22 6.22a.75.75 0 0 1 1.06 0L8 9.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L3.22 7.28a.75.75 0 0 1 0-1.06z"/>
        </svg>
      </button>
    </div>
    <div class="cb-tree" id="cb-tree" role="tree">
      <div class="cb-tree-loading">Loading file tree…</div>
    </div>
  </aside>

  <section class="cb-viewer-pane" aria-label="File viewer">
    <div class="cb-viewer-header">
      <div class="cb-viewer-filename">
        <span class="cb-file-icon" id="cb-file-icon" aria-hidden="true"></span>
        <span class="cb-file-name" id="cb-file-name">—</span>
        <span class="cb-lang-badge" id="cb-lang-badge"></span>
        <span class="cb-file-size" id="cb-file-size"></span>
      </div>
      <div class="cb-viewer-actions">
        <button class="cb-action" id="cb-copy-btn" title="Copy file contents">
          <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true" width="13" height="13">
            <path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25z"/>
            <path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25z"/>
          </svg>
          <span class="cb-action-label">Copy</span>
        </button>
        <button class="cb-action" id="cb-raw-btn" title="Open raw file">
          <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true" width="13" height="13">
            <path d="M3.75 2A1.75 1.75 0 0 0 2 3.75v8.5c0 .966.784 1.75 1.75 1.75h8.5A1.75 1.75 0 0 0 14 12.25v-3.5a.75.75 0 0 0-1.5 0v3.5a.25.25 0 0 1-.25.25h-8.5a.25.25 0 0 1-.25-.25v-8.5a.25.25 0 0 1 .25-.25h3.5a.75.75 0 0 0 0-1.5z"/>
            <path d="M9.75 2a.75.75 0 0 0 0 1.5h1.69L6.97 7.97a.75.75 0 1 0 1.06 1.06l4.47-4.47v1.69a.75.75 0 0 0 1.5 0V2.75A.75.75 0 0 0 13.25 2z"/>
          </svg>
          <span class="cb-action-label">Raw</span>
        </button>
      </div>
    </div>

    <div class="cb-viewer-body" id="cb-viewer-body">
      <div class="cb-empty-state" id="cb-empty-state">
        <p>Select a file from the tree to view its contents.</p>
      </div>

      <div class="cb-dir-view" id="cb-dir-view" hidden>
        <div class="cb-dir-list" id="cb-dir-list" role="list"></div>
      </div>

      <div class="cb-code-wrap" id="cb-code-wrap" hidden>
        <pre class="cb-line-numbers" id="cb-line-numbers" aria-hidden="true"></pre>
        <pre class="cb-code"><code id="cb-code"></code></pre>
      </div>
    </div>
  </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="./assets/browser.js"></script>

</body>
</html>
