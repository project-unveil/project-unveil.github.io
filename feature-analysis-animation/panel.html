<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Matrix panel</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  background:#f5f7fa; color:#1c232e;
  font-family: 'Segoe UI', system-ui, sans-serif; overflow:hidden;
}

/* Per-panel layout: header + body-area. The body-area is a single canvas
   covering both the SMPL row (top portion) and G1 row (bottom portion) with
   the plot stack absolute-positioned over the middle strip. This drops
   per-panel WebGL contexts to 1 (down from 4 originally, 2 in the previous
   refactor) so 9 panels' contexts stay well below Chrome's ~16-context cap. */
#root {
  width: 100%; height: 100%;
  display: grid;
  grid-template-rows: 26px 1fr;
}
#root.has-smpl {
  grid-template-rows: 26px 1fr;   /* same layout; just controls viewport split */
}

/* ── Header ─────────────────────────────────────────────── */
#panel-head {
  background: #e7ecf2;
  color: #1c232e;
  border-bottom: 1px solid #d6dde6;
  font-size: 12.5px;
  font-weight: 600;
  letter-spacing: 0.01em;
  line-height: 26px;
  text-align: center;
  padding: 0 10px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#panel-head .actor { color: #6a7585; font-weight: 400; margin-left: 6px; font-size: 11px; }

/* ── Body area (one canvas + plots overlay) ───────────────── */
#body-area {
  position: relative;
  overflow: hidden;
  background: #eef2f7;
}
#body-canvas {
  position: absolute; inset: 0;
  width: 100% !important; height: 100% !important;
  display: block;
}

/* Plot stack — absolute-positioned in the middle strip of #body-area so it
   visually sits between the SMPL (top) and G1 (bottom) viewports. Opaque
   background hides the canvas pixels behind it. */
#plots {
  position: absolute;
  left: 0; right: 0;
  top: 36%; bottom: 39%;        /* gap between SMPL row and G1 row */
  display: grid;
  grid-template-rows: 1.25fr 1fr 1fr;   /* strongest gets a bit more height */
  background: #ffffff;
  border-top: 1px solid #d6dde6;
  border-bottom: 1px solid #d6dde6;
  padding: 4px 4px 4px 0;
  gap: 2px;
  min-height: 0;
  z-index: 2;
}
.plot-row {
  position: relative;
  min-height: 0;
}
.plot-row canvas {
  display: block;
  width: 100% !important;
  height: 100% !important;
}
.plot-row .feat-label {
  position: absolute;
  top: 2px; left: 38px;
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: #4a5566;
  background: rgba(255,255,255,0.85);
  padding: 1px 6px;
  border-radius: 4px;
  pointer-events: none;
  z-index: 2;
}
.plot-row.strongest .feat-label {
  background: #fff3d6;
  color: #8a5a14;
  border: 1px solid #f1c47d;
}

.role {
  position: absolute;
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: #fff;
  padding: 2px 7px 1px 7px;
  border-radius: 99px;
  pointer-events: none;
  z-index: 3;
  font-variant-numeric: tabular-nums;
}
/* SMPL row role chips sit at top of body-area; G1 row chips sit just below
   the plot strip (top of the G1 viewport). Percentages match the #plots
   `top: 36%; bottom: 39%` split. */
.role.smpl { top: 8px;            z-index: 3; }
.role.g1   { top: calc(61% + 4px); z-index: 3; }
.role.heavy { left: 8px;  background: #e63a4a; }
.role.light { right: 8px; background: #2f7fc6; }
#root.has-smpl .role.smpl { display: block; }
.role.smpl { display: none; }    /* hidden until SMPL data loads */

/* ── Loading overlay ───────────────────────────────────── */
#loading {
  position: fixed; inset: 0; background:#f5f7fa;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; z-index: 20;
}
.spinner {
  width: 22px; height: 22px;
  border: 3px solid #d6dde6; border-top-color: #2f7fc6;
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#load-status { font-size: 10px; color: #4a5566; }
#error-msg { color:#c0394b; font-size:11px; max-width:300px; text-align:center; padding:14px; }
</style>
</head>
<body>

<div id="root">
  <div id="panel-head">— <span class="actor"></span></div>

  <div id="body-area">
    <canvas id="body-canvas"></canvas>

    <div class="role smpl heavy" id="role-smpl-high"></div>
    <div class="role smpl light" id="role-smpl-low"></div>

    <div id="plots">
      <div class="plot-row strongest" data-idx="0"><div class="feat-label"></div><canvas></canvas></div>
      <div class="plot-row"            data-idx="1"><div class="feat-label"></div><canvas></canvas></div>
      <div class="plot-row"            data-idx="2"><div class="feat-label"></div><canvas></canvas></div>
    </div>

    <div class="role g1 heavy" id="role-g1-heavy"></div>
    <div class="role g1 light" id="role-g1-light"></div>
  </div>
</div>

<div id="loading"><div class="spinner"></div><div id="load-status">Loading…</div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
'use strict';

// ── URL params ────────────────────────────────────────────
const URL_PARAMS = new URLSearchParams(location.search);
const ATTR  = URL_PARAMS.get('attr') || 'weight';
const CLIP_ID = URL_PARAMS.get('clip');
if (!CLIP_ID) { showError('panel.html: missing ?clip=<id> URL param'); throw new Error('missing clip'); }

const G1_MODEL_URL  = '../g1_engine/model/g1_model.json';
const G1_MESH_BASE  = '../g1_engine/meshes';
const MATRIX_CONFIG_URL = './data/matrix_config.json';
const MAX_FRAMES_G1 = 600;
// Must match generate_smpl_matrix.py --max-input-frames (currently 600 @ 120fps
// → 5 s slab). The G1 CSV loader slices to the SAME middle slab so the SMPL
// human and G1 robot play the same source frames.
const SMPL_INPUT_FRAMES = 600;

const DEG2RAD = Math.PI / 180;
const RAD2DEG = 180 / Math.PI;
const COLOR_HEAVY_HEX = '#e63a4a';
const COLOR_LIGHT_HEX = '#2f7fc6';

let g1Model, clip, attrCfg;
let playing = true, lastTime = null, masterTime = 0, masterDuration = 1;
const VIEWERS = {};

// CSV→joint mapping
const CSV_TO_JOINT = {
  left_hip_pitch_joint_dof: 'left_hip_pitch_joint', left_hip_roll_joint_dof: 'left_hip_roll_joint',
  left_hip_yaw_joint_dof: 'left_hip_yaw_joint', left_knee_joint_dof: 'left_knee_joint',
  left_ankle_pitch_joint_dof: 'left_ankle_pitch_joint', left_ankle_roll_joint_dof: 'left_ankle_roll_joint',
  right_hip_pitch_joint_dof: 'right_hip_pitch_joint', right_hip_roll_joint_dof: 'right_hip_roll_joint',
  right_hip_yaw_joint_dof: 'right_hip_yaw_joint', right_knee_joint_dof: 'right_knee_joint',
  right_ankle_pitch_joint_dof: 'right_ankle_pitch_joint', right_ankle_roll_joint_dof: 'right_ankle_roll_joint',
  waist_yaw_joint_dof: 'waist_yaw_joint', waist_roll_joint_dof: 'waist_roll_joint', waist_pitch_joint_dof: 'waist_pitch_joint',
  left_shoulder_pitch_joint_dof: 'left_shoulder_pitch_joint', left_shoulder_roll_joint_dof: 'left_shoulder_roll_joint',
  left_shoulder_yaw_joint_dof: 'left_shoulder_yaw_joint', left_elbow_joint_dof: 'left_elbow_joint',
  left_wrist_roll_joint_dof: 'left_wrist_roll_joint', left_wrist_pitch_joint_dof: 'left_wrist_pitch_joint',
  left_wrist_yaw_joint_dof: 'left_wrist_yaw_joint',
  right_shoulder_pitch_joint_dof: 'right_shoulder_pitch_joint', right_shoulder_roll_joint_dof: 'right_shoulder_roll_joint',
  right_shoulder_yaw_joint_dof: 'right_shoulder_yaw_joint', right_elbow_joint_dof: 'right_elbow_joint',
  right_wrist_roll_joint_dof: 'right_wrist_roll_joint', right_wrist_pitch_joint_dof: 'right_wrist_pitch_joint',
  right_wrist_yaw_joint_dof: 'right_wrist_yaw_joint',
};

// ── Boot ──────────────────────────────────────────────────
async function boot() {
  setStatus('Loading config…');
  const matrixCfg = await fetchJSON(MATRIX_CONFIG_URL);
  attrCfg = matrixCfg[ATTR];
  if (!attrCfg) throw new Error(`No attr "${ATTR}" in config`);
  clip = attrCfg.clips.find(c => c.id === CLIP_ID);
  if (!clip) throw new Error(`No clip "${CLIP_ID}" in attr "${ATTR}"`);

  document.querySelector('#panel-head').firstChild.textContent = clip.label + ' ';
  document.querySelector('#panel-head .actor').textContent = `· ${clip.actor}`;
  // Per-clip values (random within each attribute's range); units + side label
  // come from the attribute. Fall back to attr-level if a legacy config still
  // has the value at the top.
  const highV = clip.high_value ?? attrCfg.high_value;
  const lowV  = clip.low_value  ?? attrCfg.low_value;
  const highTxt = `${attrCfg.high_label} · ${highV} ${attrCfg.high_unit}`;
  const lowTxt  = `${attrCfg.low_label} · ${lowV} ${attrCfg.low_unit}`;
  document.getElementById('role-g1-heavy').textContent = highTxt;
  document.getElementById('role-g1-light').textContent = lowTxt;
  document.getElementById('role-smpl-high').textContent = highTxt;
  document.getElementById('role-smpl-low').textContent  = lowTxt;
  clip.features.forEach((f, i) => {
    const lbl = document.querySelector(`.plot-row[data-idx="${i}"] .feat-label`);
    lbl.textContent = `${f.label}  (${f.unit})`;
  });

  setStatus('Loading G1 model…');
  g1Model = await fetchJSON(G1_MODEL_URL);

  setStatus('Loading motion…');
  const baseMotion = await loadG1CSV(clip.g1_csv, MAX_FRAMES_G1);
  const lightMotion = baseMotion;
  const heavyMotion = applyScale(baseMotion, clip.scale);

  computeAllFeatures(lightMotion, clip.features);
  computeAllFeatures(heavyMotion, clip.features);
  computeMeanXY(lightMotion); computeMeanXY(heavyMotion);

  setStatus('Looking for SMPL fits…');
  const smplData = await tryLoadSMPL(ATTR, clip.id);

  masterDuration = Math.max(
    heavyMotion.duration, lightMotion.duration,
    smplData ? Math.max(smplData.high.duration, smplData.low.duration) : 0
  );

  setStatus('Building robots…');
  setupSharedRenderer();
  // Four separate scenes, one per body — each gets its own quadrant viewport
  // in the loop. Sharing one WebGL context keeps total contexts per panel = 1.
  VIEWERS.g1_heavy = await buildG1SoloScene(heavyMotion, COLOR_HEAVY_HEX, clip.highlight_joint);
  VIEWERS.g1_light = await buildG1SoloScene(lightMotion, COLOR_LIGHT_HEX, clip.highlight_joint);

  if (smplData) {
    document.getElementById('root').classList.add('has-smpl');
    VIEWERS.smpl_high = buildSMPLSoloScene(smplData.high, smplData.faces, COLOR_HEAVY_HEX);
    VIEWERS.smpl_low  = buildSMPLSoloScene(smplData.low,  smplData.faces, COLOR_LIGHT_HEX);
  }

  setupPlots();
  document.getElementById('loading').style.display = 'none';
  requestAnimationFrame(loop);
}

// ── Shared renderer + viewport plumbing ─────────────────────
// One WebGLRenderer per panel, attached to #body-canvas. We render two
// viewports per frame: SMPL on the top portion of the canvas, G1 on the
// bottom. The middle strip is hidden by the #plots HTML overlay.
let SHARED_RENDERER = null;
function setupSharedRenderer() {
  const cnv = document.getElementById('body-canvas');
  SHARED_RENDERER = new THREE.WebGLRenderer({ canvas: cnv, antialias: true });
  SHARED_RENDERER.setPixelRatio(window.devicePixelRatio);
  SHARED_RENDERER.autoClear = false;     // we clear per viewport manually
  const area = document.getElementById('body-area');
  function size() {
    const w = area.clientWidth, h = area.clientHeight;
    if (w && h) SHARED_RENDERER.setSize(w, h, false);
  }
  size();
  new ResizeObserver(size).observe(area);
}

// Viewport split — must match the CSS `top: 36%; bottom: 39%` on #plots.
// Four quadrants: SMPL row (top half) split into high (left) / low (right),
// G1 row (bottom half) split into heavy (left) / light (right). Per-body
// viewports let each camera frame ONE body tightly, ~doubling on-screen size
// vs the previous per-row layout.
function panelViewports() {
  const cnv = document.getElementById('body-canvas');
  const W = cnv.width, H = cnv.height;
  const SMPL_BOT_FRAC = 0.36;   // bottom of SMPL row
  const G1_TOP_FRAC   = 0.61;   // top of G1 row
  const halfW = Math.round(W / 2);
  const smplY = Math.round(H * (1 - SMPL_BOT_FRAC));
  const smplH = Math.round(H * SMPL_BOT_FRAC);
  const g1Y   = 0;
  const g1H   = Math.round(H * (1 - G1_TOP_FRAC));
  return {
    smplHigh: { x: 0,     y: smplY, w: halfW,     h: smplH },
    smplLow:  { x: halfW, y: smplY, w: W - halfW, h: smplH },
    g1Heavy:  { x: 0,     y: g1Y,   w: halfW,     h: g1H   },
    g1Light:  { x: halfW, y: g1Y,   w: W - halfW, h: g1H   },
  };
}

async function fetchJSON(url) { const r = await fetch(url); if (!r.ok) throw new Error(`${r.status} ${url}`); return r.json(); }
function setStatus(msg) { const el = document.getElementById('load-status'); if (el) el.textContent = msg; }
function showError(m) {
  const ld = document.getElementById('loading');
  if (ld) ld.innerHTML = `<div id="error-msg">${m}</div>`;
}

// ── CSV → motion ──────────────────────────────────────────
async function loadG1CSV(url, maxFrames) {
  const text = await fetch(url).then(r => { if (!r.ok) throw new Error(url); return r.text(); });
  const parsed = Papa.parse(text, { header: true, skipEmptyLines: true, dynamicTyping: true });
  let rows = parsed.data;
  // Slice to the same middle slab the SMPL fitter used (so the human and the
  // robot play matching source frames). Skip slicing if the clip is already
  // shorter than the slab.
  if (rows.length > SMPL_INPUT_FRAMES) {
    const start = Math.floor((rows.length - SMPL_INPUT_FRAMES) / 2);
    rows = rows.slice(start, start + SMPL_INPUT_FRAMES);
  }
  let frames = rows;
  const ratio = rows.length / maxFrames;
  if (rows.length > maxFrames) frames = Array.from({length: maxFrames}, (_, i) => rows[Math.round(i * ratio)]);
  const effFps = 120 / (rows.length > maxFrames ? ratio : 1);
  const md = {
    numFrames: frames.length, frameTime: 1/effFps, duration: frames.length/effFps,
    rootPos: new Float32Array(frames.length*3), rootQuat: new Float32Array(frames.length*4),
    joints: {}
  };
  Object.values(CSV_TO_JOINT).forEach(n => { md.joints[n] = new Float32Array(frames.length); });
  const te = new THREE.Euler(0,0,0,'ZYX'); const tq = new THREE.Quaternion();
  for (let i = 0; i < frames.length; i++) {
    const r = frames[i];
    md.rootPos[i*3]   = (r['root_translateX']||0)*0.01;
    md.rootPos[i*3+1] = (r['root_translateY']||0)*0.01;
    md.rootPos[i*3+2] = (r['root_translateZ']||0)*0.01;
    te.set((r['root_rotateX']||0)*DEG2RAD,(r['root_rotateY']||0)*DEG2RAD,(r['root_rotateZ']||0)*DEG2RAD,'ZYX');
    tq.setFromEuler(te);
    md.rootQuat[i*4]=tq.w; md.rootQuat[i*4+1]=tq.x; md.rootQuat[i*4+2]=tq.y; md.rootQuat[i*4+3]=tq.z;
    for (const [c, j] of Object.entries(CSV_TO_JOINT)) if (r[c] !== undefined) md.joints[j][i] = r[c]*DEG2RAD;
  }
  return md;
}

// ── Synthetic heavy-operator scaling ──────────────────────
// `spec.type` controls what gets dampened: 'root' shrinks root excursions
// around the mean, 'joints' shrinks each listed joint's angle around its
// per-clip mean. Mean centring keeps the trajectory in place; only the
// excursions get attenuated. `spec` can also be an ARRAY of spec objects,
// applied in order — that's how each panel exaggerates its primary feature
// most and secondary/tertiary features progressively less, so all three
// plots show a heavy/light gap.
function applyScale(src, spec) {
  if (!spec) return src;
  if (Array.isArray(spec)) {
    let m = src;
    for (const s of spec) m = applyOneScale(m, s);
    return m;
  }
  return applyOneScale(src, spec);
}

function applyOneScale(src, spec) {
  if (!spec || spec.factor === 1.0) return src;
  if (spec.type === 'root') {
    const n = src.numFrames;
    let mX = 0, mY = 0, mZ = 0;
    for (let i = 0; i < n; i++) {
      mX += src.rootPos[i*3]; mY += src.rootPos[i*3+1]; mZ += src.rootPos[i*3+2];
    }
    mX /= n; mY /= n; mZ /= n;
    const r = new Float32Array(n * 3);
    for (let i = 0; i < n; i++) {
      r[i*3]   = mX + (src.rootPos[i*3]   - mX) * spec.factor;
      r[i*3+1] = mY + (src.rootPos[i*3+1] - mY) * spec.factor;
      r[i*3+2] = mZ + (src.rootPos[i*3+2] - mZ) * spec.factor;
    }
    return { ...src, rootPos: r };
  }
  if (spec.type === 'joints') {
    const newJoints = Object.assign({}, src.joints);
    for (const name of spec.joints) {
      const arr = src.joints[name]; if (!arr) continue;
      let m = 0;
      for (let i = 0; i < arr.length; i++) m += arr[i]; m /= arr.length;
      const scaled = new Float32Array(arr.length);
      for (let i = 0; i < arr.length; i++) scaled[i] = m + (arr[i] - m) * spec.factor;
      newJoints[name] = scaled;
    }
    return { ...src, joints: newJoints };
  }
  return src;
}

function computeMeanXY(m) {
  let sx = 0, sy = 0;
  for (let i = 0; i < m.numFrames; i++) { sx += m.rootPos[i*3]; sy += m.rootPos[i*3+1]; }
  m.meanX = sx / m.numFrames; m.meanY = sy / m.numFrames;
}

// ── Features ──────────────────────────────────────────────
// Each feature spec → a Float32Array of per-frame scalar values, attached
// to motion.features[idx]. Plot rendering picks them up by index.
function computeAllFeatures(motion, specs) {
  motion.features = specs.map(s => computeFeature(motion, s));
}
function computeFeature(motion, spec) {
  const n = motion.numFrames;
  const out = new Float32Array(n);
  if (spec.type === 'root_vel') {
    for (let i = 1; i < n; i++) {
      const dx = motion.rootPos[i*3]   - motion.rootPos[(i-1)*3];
      const dy = motion.rootPos[i*3+1] - motion.rootPos[(i-1)*3+1];
      const dz = motion.rootPos[i*3+2] - motion.rootPos[(i-1)*3+2];
      out[i] = Math.sqrt(dx*dx + dy*dy + dz*dz) / motion.frameTime;
    }
  } else if (spec.type === 'joint_vel') {
    const arr = motion.joints[spec.joint];
    if (arr) {
      for (let i = 1; i < n; i++) {
        out[i] = Math.abs(arr[i] - arr[i-1]) * RAD2DEG / motion.frameTime;
      }
    }
  } else if (spec.type === 'joint_angle') {
    const arr = motion.joints[spec.joint];
    if (arr) for (let i = 0; i < n; i++) out[i] = arr[i] * RAD2DEG;
  }
  // Stash range for symmetric Y-axis (used by joint_angle plots).
  let mn = +Infinity, mx = -Infinity;
  for (let i = (spec.type === 'joint_angle' ? 0 : 1); i < n; i++) {
    if (out[i] < mn) mn = out[i];
    if (out[i] > mx) mx = out[i];
  }
  return { values: out, min: mn, max: mx, spec };
}

// ── G1 viewer ─────────────────────────────────────────────
const stlCache = {};
async function loadSTL(name) {
  if (stlCache[name]) return stlCache[name];
  return new Promise(resolve => {
    new THREE.STLLoader().load(`${G1_MESH_BASE}/${name}.STL`,
      g => { g.computeVertexNormals(); stlCache[name] = g; resolve(g); },
      undefined, () => { stlCache[name] = null; resolve(null); });
  });
}

// Find the G1 body whose joint.name matches `jointName`, or null if not found.
// 'root' is treated specially → returns the synthetic key 'ROOT'.
function findBodyForJoint(jointName) {
  if (!jointName || jointName === 'root') return 'ROOT';
  for (const b of g1Model.bodies) if (b.joint && b.joint.name === jointName) return b.name;
  return null;
}

// Build ONE robot inside `parentGroup` (which provides the world-X offset,
// Z-up→Y-up rotation, and any future scaling). Returns the per-robot apply
// function plus the body lookup map.
async function buildG1Robot(parentGroup, accentHex, highlightJoint) {
  const groupMap = {}, bodyGroups = {};
  let rootGroup = null;
  for (const body of g1Model.bodies) {
    const outer = new THREE.Group();
    outer.position.set(...body.pos);
    outer.quaternion.set(body.quat[1], body.quat[2], body.quat[3], body.quat[0]);
    const inner = new THREE.Group();
    outer.add(inner);
    groupMap[body.name] = { outer, inner }; bodyGroups[body.name] = inner;
  }
  for (const body of g1Model.bodies) {
    const { outer } = groupMap[body.name];
    if (body.parent && groupMap[body.parent]) groupMap[body.parent].inner.add(outer);
    else { parentGroup.add(outer); rootGroup = outer; }
  }
  const accentCol = new THREE.Color(accentHex);
  const matCache = {};
  function getMat(rgba) {
    const isDark = rgba[0] < 0.4;
    const key = isDark ? 'dark' : 'light';
    if (!matCache[key]) {
      const base = isDark ? new THREE.Color(0x1a1d24) : new THREE.Color(0xcdd3df);
      const col = base.clone().lerp(accentCol, isDark ? 0.05 : 0.07);
      matCache[key] = new THREE.MeshStandardMaterial({
        color: col, metalness: isDark ? 0.55 : 0.18, roughness: isDark ? 0.40 : 0.50,
      });
    }
    return matCache[key];
  }
  const loadPromises = [];
  for (const body of g1Model.bodies) {
    for (const mesh of body.meshes) {
      loadPromises.push(loadSTL(mesh.name).then(geo => {
        if (!geo) return;
        const m = new THREE.Mesh(geo, getMat(mesh.rgba));
        m.position.set(...mesh.pos);
        m.quaternion.set(mesh.quat[1], mesh.quat[2], mesh.quat[3], mesh.quat[0]);
        groupMap[body.name].inner.add(m);
      }));
    }
  }
  await Promise.all(loadPromises);

  // Highlight sphere on the joint corresponding to the strongest feature.
  const highlightBody = findBodyForJoint(highlightJoint);
  let highlightParent = rootGroup;
  if (highlightBody && highlightBody !== 'ROOT' && bodyGroups[highlightBody]) {
    highlightParent = bodyGroups[highlightBody];
  }
  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(0.07, 20, 14),
    new THREE.MeshBasicMaterial({ color: accentHex, transparent: true, opacity: 0.85 }),
  );
  highlightParent.add(sphere);
  const glow = new THREE.Mesh(
    new THREE.SphereGeometry(0.14, 20, 14),
    new THREE.MeshBasicMaterial({ color: accentHex, transparent: true, opacity: 0.28, side: THREE.BackSide }),
  );
  highlightParent.add(glow);

  return { rootGroup, bodyGroups, glow };
}

// One scene with one G1 robot at world origin. Camera framed tightly on it.
// We build TWO of these per panel (one for heavy, one for light) so each
// body fills its own viewport instead of sharing a wide row with the other.
async function buildG1SoloScene(motion, accentHex, highlightJoint) {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color('#f3f6fa');

  // Aspect set per-frame by the renderer (depends on viewport size).
  // FOV 35° at d=3.0 m → 1.89 m vertical visible, body ~1.8 m → ~95% fill.
  const camera = new THREE.PerspectiveCamera(35, 1, 0.05, 30);
  camera.position.set(0, 1.05, 3.0);
  camera.lookAt(0, 0.85, 0);

  scene.add(new THREE.HemisphereLight(0xffffff, 0xc0c8d4, 1.05));
  const sun = new THREE.DirectionalLight(0xfff4e0, 1.0);
  sun.position.set(3, 7, 4); scene.add(sun);

  const floor = new THREE.Mesh(new THREE.PlaneGeometry(8, 8),
                               new THREE.MeshBasicMaterial({ color: 0xe2e7ee }));
  floor.rotation.x = -Math.PI/2; scene.add(floor);

  const robotWorld = new THREE.Group();
  robotWorld.rotation.x = -Math.PI/2;
  scene.add(robotWorld);

  const robot = await buildG1Robot(robotWorld, accentHex, highlightJoint);

  function applyFrameAtTime(t) {
    const fi = Math.min(motion.numFrames - 1,
                        Math.floor((t % motion.duration) / motion.frameTime));
    robot.rootGroup.position.set(
      motion.rootPos[fi*3]   - motion.meanX,
      motion.rootPos[fi*3+1] - motion.meanY,
      motion.rootPos[fi*3+2],
    );
    robot.rootGroup.quaternion.set(motion.rootQuat[fi*4+1], motion.rootQuat[fi*4+2],
                                   motion.rootQuat[fi*4+3], motion.rootQuat[fi*4]);
    for (const body of g1Model.bodies) {
      if (!body.joint || body.joint.type !== 'hinge') continue;
      const jArr = motion.joints[body.joint.name]; if (!jArr) continue;
      const axis = new THREE.Vector3(...body.joint.axis);
      const q = new THREE.Quaternion().setFromAxisAngle(axis, jArr[fi]);
      robot.bodyGroups[body.name].quaternion.copy(q);
    }
    const phase = (performance.now() * 0.003) % (Math.PI * 2);
    robot.glow.scale.setScalar(1 + 0.20 * Math.sin(phase));
  }
  return { scene, camera, applyFrameAtTime, motion };
}

// ── SMPL (optional, loaded if matching .bin files exist) ─────
function parseVertsBin(buf) {
  const v = new DataView(buf);
  const nf = v.getUint32(0, true), nv = v.getUint32(4, true), fps = v.getFloat32(8, true);
  return { numFrames: nf, numVerts: nv, fps, verts: new Float32Array(buf, 12), duration: nf / fps };
}
function parseFacesBin(buf) {
  const v = new DataView(buf); const nf = v.getUint32(0, true);
  return new Uint32Array(buf, 4, nf * 3);
}
async function tryLoadSMPL(attr, clipId) {
  // GET-with-status-check is more reliable than HEAD here: python http.server
  // does support HEAD but the responses occasionally lag behind the body
  // server when many iframes hit it simultaneously, causing false negatives.
  const base = `./data/smpl_matrix/${attr}`;
  try {
    const [facesR, highR, lowR] = await Promise.all([
      fetch(`${base}/faces.bin`),
      fetch(`${base}/${clipId}_high.bin`),
      fetch(`${base}/${clipId}_low.bin`),
    ]);
    if (!facesR.ok || !highR.ok || !lowR.ok) {
      console.warn(`[panel ${clipId}] SMPL bins missing (faces=${facesR.status}, high=${highR.status}, low=${lowR.status})`);
      return null;
    }
    const [facesBuf, highBuf, lowBuf] = await Promise.all([
      facesR.arrayBuffer(), highR.arrayBuffer(), lowR.arrayBuffer()
    ]);
    const faces = parseFacesBin(facesBuf);
    const high  = parseVertsBin(highBuf);
    const low   = parseVertsBin(lowBuf);
    computeSMPLCentroid(high); computeSMPLCentroid(low);
    return { faces, high, low };
  } catch (e) {
    console.warn(`[panel ${clipId}] SMPL load failed:`, e);
    return null;
  }
}
function computeSMPLCentroid(data) {
  let sx = 0, sz = 0, n = 0;
  for (let fi = 0; fi < data.numFrames; fi++) {
    const base = fi * data.numVerts * 3;
    for (let j = 0; j < data.numVerts; j++) {
      sx += data.verts[base + j*3];
      sz += data.verts[base + j*3 + 2];
      n++;
    }
  }
  data.meanX = sx / n; data.meanZ = sz / n;
}

// One SMPL mesh inside `parentGroup`. Returns its applyFrame function.
function buildSMPLMesh(parentGroup, data, faces, accentHex) {
  const baseSkin = new THREE.Color(0.94, 0.76, 0.58);
  const tint = new THREE.Color(accentHex);
  const skin = baseSkin.clone().lerp(tint, 0.06);

  const geo = new THREE.BufferGeometry();
  const posAttr = new THREE.BufferAttribute(new Float32Array(data.numVerts * 3), 3);
  geo.setAttribute('position', posAttr);
  geo.setIndex(new THREE.BufferAttribute(faces, 1));
  const mat = new THREE.MeshPhongMaterial({
    color: skin, specular: 0x111111, shininess: 25, side: THREE.DoubleSide,
  });
  const mesh = new THREE.Mesh(geo, mat);
  parentGroup.add(mesh);

  // Floor alignment via 10th percentile of per-frame min-Y.
  const frameMin = new Float32Array(data.numFrames);
  for (let fi = 0; fi < data.numFrames; fi++) {
    const base = fi * data.numVerts * 3;
    let mn = Infinity;
    for (let j = 0; j < data.numVerts; j++) {
      const y = data.verts[base + j*3 + 1];
      if (y < mn) mn = y;
    }
    frameMin[fi] = mn;
  }
  const sorted = [...frameMin].sort((a,b) => a - b);
  const yOff = sorted[Math.floor(sorted.length * 0.10)];

  const arr = posAttr.array;
  const mX = data.meanX, mZ = data.meanZ;
  function applyFrame(fi) {
    const base = fi * data.numVerts * 3;
    for (let j = 0; j < data.numVerts; j++) {
      arr[j*3]   = data.verts[base + j*3]     - mX;
      arr[j*3+1] = data.verts[base + j*3 + 1] - yOff;
      arr[j*3+2] = data.verts[base + j*3 + 2] - mZ;
    }
    posAttr.needsUpdate = true;
    geo.computeVertexNormals();
  }
  return { applyFrame, duration: data.duration, frameTime: 1/data.fps,
           numFrames: data.numFrames };
}

// One SMPL body in its own scene, framed tightly. Same per-body pattern as
// buildG1SoloScene.
function buildSMPLSoloScene(data, faces, accentHex) {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color('#eef2f7');

  const camera = new THREE.PerspectiveCamera(33, 1, 0.05, 30);
  camera.position.set(0, 1.05, 3.0);
  camera.lookAt(0, 0.95, 0);

  scene.add(new THREE.HemisphereLight(0xffffff, 0xc0c8d4, 1.05));
  const sun = new THREE.DirectionalLight(0xfff4e0, 0.95);
  sun.position.set(3, 7, 4); scene.add(sun);

  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(8, 8),
    new THREE.MeshBasicMaterial({ color: 0xdee4ec })
  );
  floor.rotation.x = -Math.PI/2; scene.add(floor);

  const meshHolder = new THREE.Group();
  scene.add(meshHolder);
  const mesh = buildSMPLMesh(meshHolder, data, faces, accentHex);

  function applyFrameAtTime(t) {
    const fi = Math.min(mesh.numFrames - 1,
                        Math.floor((t % mesh.duration) / mesh.frameTime));
    mesh.applyFrame(fi);
  }
  return { scene, camera, applyFrameAtTime };
}

// ── Plot stack ────────────────────────────────────────────
const PLOT_CTXS = [];
function setupPlots() {
  document.querySelectorAll('.plot-row').forEach((row, i) => {
    const cnv = row.querySelector('canvas');
    const ctx = cnv.getContext('2d');
    PLOT_CTXS[i] = { row, cnv, ctx };
    function size() {
      const w = row.clientWidth, h = row.clientHeight;
      if (w <= 0 || h <= 0) return;
      const dpr = window.devicePixelRatio;
      cnv.width  = Math.round(w * dpr);
      cnv.height = Math.round(h * dpr);
      cnv.style.width = w + 'px'; cnv.style.height = h + 'px';
    }
    size();
    new ResizeObserver(size).observe(row);
  });
}

// Each plot row is a side-by-side split: heavy curve in left half, light in
// right half, sharing the same Y axis. A small gap separates them. Curves
// only draw up to the current playhead, so the strip grows with time and
// resets when the clip loops.
function drawPlots() {
  const dpr = window.devicePixelRatio;
  const frac = (masterTime / masterDuration) % 1;
  for (let i = 0; i < clip.features.length; i++) {
    const spec = clip.features[i];
    const { cnv, ctx } = PLOT_CTXS[i];
    const W = cnv.width, H = cnv.height;
    ctx.clearRect(0, 0, W, H);
    const padL = 36*dpr, padR = 6*dpr, padT = 12*dpr, padB = 4*dpr;
    const gap = 12*dpr;
    const subW = (W - padL - padR - gap) / 2;
    const plotH = H - padT - padB;

    // Y range shared across heavy/light for this feature.
    const hF = VIEWERS.g1.heavyMotion.features[i];
    const lF = VIEWERS.g1.lightMotion.features[i];
    let mn, mx;
    if (spec.type === 'joint_angle') {
      const m = Math.max(Math.abs(hF.min), Math.abs(hF.max), Math.abs(lF.min), Math.abs(lF.max), 5);
      mn = -m * 1.08; mx = +m * 1.08;
    } else {
      mn = 0;
      mx = Math.max(hF.max, lF.max, 0.05) * 1.08;
    }
    const Yof = (v) => padT + plotH - ((v - mn) / (mx - mn)) * plotH;

    // Y-axis labels (left side of left sub-plot only).
    ctx.fillStyle = '#6a7585';
    ctx.font = `${9*dpr}px Segoe UI`;
    ctx.textBaseline = 'middle'; ctx.textAlign = 'right';
    const ticks = (spec.type === 'joint_angle') ? [mn, 0, mx] : [mn, mx];
    for (const v of ticks) {
      const y = Yof(v);
      const txt = (spec.type === 'joint_angle')
        ? (v === 0 ? '0' : v.toFixed(0))
        : v.toFixed(spec.type === 'root_vel' ? 1 : 0);
      ctx.fillText(txt, padL - 3*dpr, y);
      ctx.strokeStyle = (Math.abs(v) < 1e-6) ? 'rgba(20,30,50,0.18)' : 'rgba(20,30,50,0.06)';
      ctx.lineWidth = 1*dpr;
      ctx.beginPath();
      ctx.moveTo(padL, y); ctx.lineTo(padL + subW, y);
      ctx.moveTo(padL + subW + gap, y); ctx.lineTo(padL + subW + gap + subW, y);
      ctx.stroke();
    }

    function plotSide(arr, color, subX) {
      const n = arr.length;
      const upToFrame = Math.max(1, Math.min(n - 1, Math.floor(frac * (n - 1)) + 1));

      // axis frame
      ctx.strokeStyle = '#c6cfdb'; ctx.lineWidth = 1*dpr;
      ctx.beginPath();
      ctx.moveTo(subX, padT); ctx.lineTo(subX, padT + plotH);
      ctx.lineTo(subX + subW, padT + plotH); ctx.stroke();

      // filled area
      ctx.fillStyle = color + '24';
      ctx.beginPath();
      const baseY = (spec.type === 'joint_angle') ? Yof(0) : (padT + plotH);
      ctx.moveTo(subX, baseY);
      for (let k = 0; k <= upToFrame; k++) {
        const x = subX + (k / (n - 1)) * subW;
        ctx.lineTo(x, Yof(arr[k]));
      }
      const xEnd = subX + (upToFrame / (n - 1)) * subW;
      ctx.lineTo(xEnd, baseY); ctx.closePath(); ctx.fill();

      // line
      ctx.strokeStyle = color; ctx.lineWidth = 1.8 * dpr;
      ctx.beginPath();
      for (let k = 0; k <= upToFrame; k++) {
        const x = subX + (k / (n - 1)) * subW;
        const y = Yof(arr[k]);
        if (k === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();

      // Running ROM band for joint_angle features.
      if (spec.show_rom) {
        let bmn = +Infinity, bmx = -Infinity;
        for (let k = 0; k <= upToFrame; k++) {
          if (arr[k] < bmn) bmn = arr[k];
          if (arr[k] > bmx) bmx = arr[k];
        }
        if (isFinite(bmn) && isFinite(bmx) && bmx > bmn + 0.5) {
          ctx.strokeStyle = color; ctx.lineWidth = 1*dpr;
          ctx.setLineDash([4*dpr, 4*dpr]);
          for (const v of [bmn, bmx]) {
            const y = Yof(v);
            ctx.beginPath();
            ctx.moveTo(subX, y); ctx.lineTo(subX + subW, y); ctx.stroke();
          }
          ctx.setLineDash([]);
        }
      }

      // time cursor
      const cx = subX + frac * subW;
      ctx.strokeStyle = 'rgba(20,30,50,0.5)'; ctx.lineWidth = 1.2*dpr;
      ctx.beginPath(); ctx.moveTo(cx, padT); ctx.lineTo(cx, padT + plotH); ctx.stroke();
    }
    plotSide(hF.values, COLOR_HEAVY_HEX, padL);
    plotSide(lF.values, COLOR_LIGHT_HEX, padL + subW + gap);
  }
}

// ── Animation loop ───────────────────────────────────────
function loop(ts) {
  requestAnimationFrame(loop);
  if (playing) {
    if (lastTime === null) lastTime = ts;
    const dt = (ts - lastTime) * 0.001; lastTime = ts;
    masterTime = (masterTime + dt) % masterDuration;
  } else { lastTime = null; }

  for (const v of Object.values(VIEWERS)) v.applyFrameAtTime(masterTime);

  if (SHARED_RENDERER) {
    const vp = panelViewports();
    SHARED_RENDERER.setScissorTest(true);
    renderViewport(VIEWERS.smpl_high, vp.smplHigh);
    renderViewport(VIEWERS.smpl_low,  vp.smplLow);
    renderViewport(VIEWERS.g1_heavy,  vp.g1Heavy);
    renderViewport(VIEWERS.g1_light,  vp.g1Light);
    SHARED_RENDERER.setScissorTest(false);
  }
  drawPlots();
}

function renderViewport(viewer, vp) {
  if (!viewer) return;
  const c = viewer.camera;
  c.aspect = vp.w / Math.max(1, vp.h);
  c.updateProjectionMatrix();
  SHARED_RENDERER.setViewport(vp.x, vp.y, vp.w, vp.h);
  SHARED_RENDERER.setScissor (vp.x, vp.y, vp.w, vp.h);
  SHARED_RENDERER.clear();
  SHARED_RENDERER.render(viewer.scene, c);
}

boot().catch(err => { showError(err.message); console.error(err); });
</script>
