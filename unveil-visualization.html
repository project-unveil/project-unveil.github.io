<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex, nofollow"/>
<title>UNVEIL — Framework Walkthrough</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@500;700&family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --primary:    #2c3e6b;
  --primary-2:  #3a528f;
  --accent:     #e74c3c;
  --ink:        #1a1f2e;
  --muted:      #6e7689;
  --soft:       #eef0f6;
  --paper:      #ffffff;
  --border:     #e0e5ee;
  --c-torso:    #8e8e93;
  --c-la:       #e74c3c;
  --c-ra:       #f39c12;
  --c-ll:       #27ae60;
  --c-rl:       #2980b9;
  --enc-color:  #9b6dbf;     /* kinematic encoding outline */
  --graph-color:#2c8aa8;     /* graph convolution outline */
  --spatial-color:#d49234;   /* spatiotemporal aggregation outline */
}

html, body {
  width:100%; height:100%;
  background: #ffffff;
  font-family: 'Source Sans 3', 'Segoe UI', system-ui, sans-serif;
  color: var(--ink);
  overflow: hidden;
}

#page-wrap {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 18px 24px;
  background: radial-gradient(circle at 50% 0%, #f4f6fb 0%, #ffffff 60%);
}
#page-title {
  font-family: 'Noto Serif', serif;
  font-weight: 700; font-size: 19px;
  color: var(--primary);
  margin-bottom: 10px;
}
#page-title .sub {
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 400; font-size: 13px;
  color: var(--muted); margin-left: 10px;
}

#panel {
  position: relative;
  width: min(96vw, 1640px);
  height: min(72vh, 668px);
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 16px;
  box-shadow: 0 30px 80px rgba(33,52,100,0.08), 0 6px 18px rgba(33,52,100,0.06);
  overflow: hidden;
  display: flex; flex-direction: column;
}

#panel-header {
  flex-shrink: 0;
  height: 50px;
  display: flex; align-items: center;
  padding: 0 18px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, #fafbfd 0%, #ffffff 100%);
  z-index: 4;
}
#panel-header .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); margin-right: 10px;
  box-shadow: 0 0 0 3px rgba(231,76,60,0.18);
}
#panel-header .title {
  font-family: 'Noto Serif', serif;
  font-weight: 700; font-size: 14px;
  color: var(--primary);
}
#panel-header .ref {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--muted); margin-left: 8px;
}
#panel-header .spacer { flex: 1; }
#panel-header .stage-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; color: var(--muted);
  background: var(--soft);
  padding: 3px 9px; border-radius: 99px;
  margin-right: 10px;
  letter-spacing: 0.06em; text-transform: uppercase;
}
#panel-header select, #panel-header button {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 12px; font-weight: 500;
  background: #ffffff; color: var(--ink);
  border: 1px solid var(--border);
  padding: 5px 10px; border-radius: 6px;
  cursor: pointer;
}
#panel-header select:hover, #panel-header button:hover {
  border-color: var(--primary); color: var(--primary);
}
#replay-btn {
  background: var(--primary); color: #fff; border-color: var(--primary);
  margin-left: 8px; display: none;
}
#replay-btn.visible { display: inline-block; }
#replay-btn:hover { background: var(--accent); border-color: var(--accent); color:#fff; }

#canvas-wrap {
  flex: 1; position: relative;
  background: #ffffff; overflow: hidden;
}
canvas { display: block; }
canvas#three-canvas { width: 100% !important; height: 100% !important; }

/* SVG overlay drawn on top of canvas, covers full wrap */
#svg-overlay {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  overflow: visible;
}

/* Slot labels — positioned BELOW the figures (anchor = top-center) */
.slot-label {
  position: absolute;
  transform: translate(-50%, 0);
  font-family: 'Noto Serif', serif;
  font-size: 13px; font-weight: 700;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.55s ease;
  white-space: nowrap;
  text-align: center;
}
.slot-label.visible { opacity: 1; }
.slot-label .underline {
  display: block; width: 30px; height: 2px;
  background: var(--accent);
  margin: 0 auto 5px; border-radius: 1px;
}
.slot-label .ref {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 500;
  color: var(--muted);
  display: block;
  letter-spacing: 0.06em;
  margin-top: 2px;
  text-transform: none;
}


/* Data plates — one box per joint, contains both vel + accel graphs */
.data-plate {
  position: absolute;
  transform: translate(-50%, -50%);
  background: #ffffff;
  border: 1px solid var(--enc-color);
  border-radius: 8px;
  padding: 6px 9px 8px;
  width: 130px;
  box-shadow: 0 6px 16px rgba(155,109,191,0.18);
  opacity: 0;
  transition: opacity 0.55s ease;
  pointer-events: none;
  z-index: 3;
}
.data-plate.visible { opacity: 1; }
.data-plate .dp-head {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  font-weight: 600;
  color: var(--ink);
  text-align: center;
  letter-spacing: 0.06em;
  margin-bottom: 5px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--soft);
}
.data-plate .dp-row {
  display: flex; align-items: center; gap: 6px;
  margin: 3px 0;
}
.data-plate .dp-row .dp-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  font-weight: 600;
  width: 22px;
  flex-shrink: 0;
  text-align: left;
  letter-spacing: 0.02em;
}
.data-plate .dp-row canvas {
  flex: 1; height: 18px; display: block;
}

/* Module rect labels (top of each rect) */
#enc-label, #graph-label, #spatial-label {
  position: absolute;
  transform: translate(-50%, -100%);
  background: #ffffff;
  border-radius: 6px;
  padding: 4px 12px;
  font-family: 'Noto Serif', serif;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  opacity: 0;
  transition: opacity 0.5s ease;
  pointer-events: none;
  z-index: 3;
  white-space: nowrap;
  text-align: center;
  line-height: 1.25;
}
#graph-label,
#spatial-label { white-space: normal; max-width: 220px; }
#enc-label     { border: 1px solid var(--enc-color);     color: var(--enc-color);     box-shadow: 0 4px 12px rgba(155,109,191,0.18); }
#graph-label   { border: 1px solid var(--graph-color);   color: var(--graph-color);   box-shadow: 0 4px 12px rgba(44,138,168,0.18);  }
#spatial-label { border: 1px solid var(--spatial-color); color: var(--spatial-color); box-shadow: 0 4px 12px rgba(212,146,52,0.18);  }
#enc-label.visible, #graph-label.visible, #spatial-label.visible { opacity: 1; }
#enc-label .ref, #graph-label .ref, #spatial-label .ref {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-left: 6px;
  font-weight: 500;
  text-transform: none;
  letter-spacing: 0;
}

/* Retarget arrow label (between human and G1) */
#retarget-label {
  position: absolute;
  transform: translate(-50%, -100%);
  background: #ffffff;
  border: 1px solid var(--accent);
  border-radius: 6px;
  padding: 4px 10px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 11px; font-weight: 600;
  color: var(--accent);
  letter-spacing: 0.02em;
  text-align: center;
  line-height: 1.25;
  opacity: 0;
  transition: opacity 0.5s ease;
  pointer-events: none;
  z-index: 3;
  box-shadow: 0 4px 12px rgba(231,76,60,0.18);
}
#retarget-label.visible { opacity: 1; }

/* Beat indicator (graph conv) — positioned dynamically below graph G1 */
#beat-indicator {
  position: absolute;
  transform: translateX(-50%);
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 6px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  color: var(--ink);
  box-shadow: 0 8px 22px rgba(33,52,100,0.14);
  opacity: 0;
  transition: opacity 0.4s ease;
  pointer-events: none;
  z-index: 4;
  letter-spacing: 0.03em;
  white-space: nowrap;
}
#beat-indicator.visible { opacity: 1; }
#beat-indicator .bi-mode {
  font-weight: 700;
  font-size: 11.5px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-right: 8px;
  color: var(--primary);
}
#beat-indicator.intra .bi-mode { color: var(--primary); }   /* Intra Limb → blue */
#beat-indicator.inter .bi-mode { color: var(--accent); }    /* Inter Limb → red */
#beat-indicator .bi-limbs {
  font-weight: 600;
  font-size: 11.5px;
  color: var(--ink);
  letter-spacing: 0.02em;
}

/* Attribute embedding — vertical column on far right (lifted 2cm above center) */
#embedding-strip {
  position: absolute;
  right: 24px;
  top: calc(50% - 76px);
  transform: translateY(-50%) translateX(20px);
  width: 96px;
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 10px 12px;
  box-shadow: 0 12px 32px rgba(33,52,100,0.14);
  opacity: 0;
  transition: opacity 0.6s ease, transform 0.6s ease;
  pointer-events: none;
  z-index: 4;
  display: flex; flex-direction: column;
  align-items: center; gap: 8px;
}
#embedding-strip.visible { opacity: 1; transform: translateY(-50%) translateX(0); }
#embedding-strip .em-head {
  font-family: 'Noto Serif', serif;
  font-size: 10.5px; font-weight: 700;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  text-align: center;
  line-height: 1.2;
}
#embedding-strip .em-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; color: var(--muted);
  text-align: center;
}
#embedding-canvas {
  width: 36px; height: 380px;
  display: block;
  border-radius: 4px;
  background: #f4f6fb;
  border: 1px solid var(--border);
}
#embedding-strip .em-foot {
  font-size: 9px; color: var(--muted);
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
}

/* Σ aggregate icon */
#aggregate-icon {
  position: absolute;
  transform: translate(-50%, -50%);
  width: 64px; height: 64px;
  background: linear-gradient(145deg, #b67cd8 0%, #9b6dbf 100%);
  color: #ffffff;
  border-radius: 50%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: 'Noto Serif', serif;
  font-weight: 700;
  box-shadow: 0 8px 20px rgba(155,109,191,0.5);
  opacity: 0;
  transition: opacity 0.5s ease;
  pointer-events: none;
  z-index: 3;
  border: 2px solid #ffffff;
}
#aggregate-icon.visible { opacity: 1; }
#aggregate-icon .ai-symbol {
  font-size: 30px; line-height: 1;
}
#aggregate-icon .ai-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 2px;
  font-weight: 500;
}

/* Caption */
#caption-bar {
  flex-shrink: 0;
  height: 42px;
  display: flex; align-items: center; justify-content: center;
  padding: 0 20px;
  border-top: 1px solid var(--border);
  background: linear-gradient(0deg, #fafbfd 0%, #ffffff 100%);
  font-size: 13px;
  color: var(--ink);
  text-align: center;
}
#caption-bar .ref {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--accent);
  margin-right: 10px; font-weight: 600;
}
#caption-bar .text { font-weight: 500; }

/* Loading / error */
#loading {
  position: absolute; inset: 0;
  background: #ffffff;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; z-index: 50;
  color: var(--ink);
}
.spinner {
  width: 38px; height: 38px;
  border: 3px solid rgba(44,62,107,0.18);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#load-status { font-size: 12px; color: var(--muted); max-width: 360px; text-align: center; }

#error-box {
  display: none; position: absolute; inset: 0;
  background: #fff8f8;
  align-items: center; justify-content: center;
  color: var(--accent); font-size: 13px;
  padding: 30px; text-align: center;
  z-index: 60;
  font-family: 'JetBrains Mono', monospace;
}

/* SVG element styles */
.svg-ellipse {
  fill: none;
  stroke-width: 1.8;
  stroke-dasharray: 6 4;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.svg-conn {
  stroke-width: 2.5;
  stroke-linecap: round;
  fill: none;
  opacity: 0;
  stroke-dasharray: 8 6;
}
.svg-focus-ring {
  fill: none;
  stroke: var(--enc-color);
  stroke-width: 1.5;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.svg-leader {
  stroke: var(--enc-color);
  stroke-width: 1.2;
  stroke-dasharray: 3 3;
  fill: none;
  opacity: 0;
  transition: opacity 0.4s ease;
}
#enc-rect {
  fill: none;
  stroke: var(--enc-color);
  stroke-width: 1.6;
  stroke-dasharray: 9 5;
  opacity: 0;
  transition: opacity 0.5s ease;
  rx: 14;
  ry: 14;
}
#graph-rect {
  fill: none;
  stroke: var(--graph-color);
  stroke-width: 1.6;
  stroke-dasharray: 9 5;
  opacity: 0;
  transition: opacity 0.5s ease;
  rx: 14;
  ry: 14;
}
#spatial-rect {
  fill: none;
  stroke: var(--spatial-color);
  stroke-width: 1.6;
  stroke-dasharray: 9 5;
  opacity: 0;
  transition: opacity 0.5s ease;
  rx: 14;
  ry: 14;
}
#human-rect {
  fill: none;
  stroke: var(--muted);
  stroke-width: 1.4;
  stroke-dasharray: 7 4;
  opacity: 0;
  transition: opacity 0.5s ease;
  rx: 10;
  ry: 10;
}
#retarget-arrow {
  stroke: var(--accent);
  stroke-width: 2;
  stroke-dasharray: 7 5;
  fill: none;
  opacity: 0;
  transition: opacity 0.5s ease;
}
.joint-dot {
  fill: var(--accent);
  opacity: 0;
}
</style>
</head>
<body>

<div id="page-wrap">
  <div id="page-title">
    UNVEIL <span class="sub">Framework Walkthrough</span>
  </div>

  <div id="panel">
    <div id="panel-header">
      <span class="spacer"></span>
      <span class="stage-badge" id="stage-badge">Stage 1 / 6</span>
      <select id="activity-dropdown" title="Activity"></select>
      <button id="replay-btn" title="Replay">↻ Replay</button>
    </div>

    <div id="canvas-wrap">
      <!-- 3D scene canvas -->
      <!-- (renderer appends one here) -->

      <!-- Slot labels (below the figures) -->
      <div class="slot-label" id="lbl-human">
        <span class="underline"></span>Human Operator<span class="ref">SMPL ground truth</span>
      </div>

      <!-- Aggregate Σ icon (appears mid-stage 5) -->
      <div id="aggregate-icon">
        <div class="ai-symbol">Σ</div>
        <div class="ai-label">aggregate</div>
      </div>

      <!-- SVG overlay (all 2D shapes drawn over the 3D scene) -->
      <svg id="svg-overlay">
        <defs>
          <marker id="arr-retarget" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#e74c3c"/>
          </marker>
        </defs>
        <!-- Human boundary (around SMPL) -->
        <rect id="human-rect" x="0" y="0" width="0" height="0"/>
        <!-- Kinematic encoding rectangle (around G1) -->
        <rect id="enc-rect" x="0" y="0" width="0" height="0"/>
        <!-- Graph convolution rectangle (around graph G1) -->
        <rect id="graph-rect" x="0" y="0" width="0" height="0"/>
        <!-- Spatiotemporal aggregation rectangle (around spatial G1 + ghosts + Σ icon) -->
        <rect id="spatial-rect" x="0" y="0" width="0" height="0"/>
        <!-- Retargeting arrow (human → G1) -->
        <line id="retarget-arrow" x1="0" y1="0" x2="0" y2="0" marker-end="url(#arr-retarget)"/>
        <!-- Focus rings + leader lines for picked joints -->
        <g id="g-focus"></g>
        <!-- Limb ellipses + animated cross-edges -->
        <g id="g-limbs"></g>
        <g id="g-conns"></g>
      </svg>

      <!-- Kinematic encoding label (positioned above the rectangle) -->
      <div id="enc-label">Kinematic Encoding <span class="ref">§3.1</span></div>
      <!-- Graph conv label (positioned above the graph rectangle) -->
      <div id="graph-label">Hierarchical Spatial<br>Graph Convolution <span class="ref">§3.2</span></div>
      <!-- Spatiotemporal aggregation label (positioned above the spatial rectangle) -->
      <div id="spatial-label">Spatiotemporal<br>Aggregation <span class="ref">§3.3</span></div>
      <!-- Retargeting arrow label (positioned at midpoint between human and G1) -->
      <div id="retarget-label">Human to Humanoid<br>Retargeting</div>

      <!-- Data plates (created by JS) -->
      <div id="plates-holder"></div>

      <!-- Beat indicator for graph conv -->
      <div id="beat-indicator">
        <span class="bi-mode" id="bi-mode">—</span>
        <span class="bi-limbs" id="bi-limbs">—</span>
      </div>

<!-- Attribute embedding (vertical, far right) -->
      <div id="embedding-strip">
        <div class="em-head">Attribute<br>Embedding</div>
        <div class="em-sub">Z ∈ ℝ²⁵⁶</div>
        <canvas id="embedding-canvas"></canvas>
        <div class="em-foot">§3.4</div>
      </div>

      <div id="loading">
        <div class="spinner"></div>
        <div id="load-status">Booting…</div>
      </div>
      <div id="error-box"></div>
    </div>

    <div id="caption-bar">
      <span class="text" id="cap-text"></span>
    </div>
  </div>
</div>

<!-- Three.js + loaders -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
'use strict';

// ─── Config ─────────────────────────────────────────────────────────────────
const DEG2RAD = Math.PI / 180;
const DEFAULT_DEMO = 'hiphop';
const BIN_VERSION  = '2026-05-19a';
const withV = u => u + (u.includes('?') ? '&' : '?') + 'v=' + BIN_VERSION;

const SLOT_X = { human: -6.0, robot: -3.7, graph: -0.4, spatial: 3.5 };
const GHOST_SPREAD = 0.42;   // world units between ghost figures (in x)
// World units the arrow's right end stays away from G1 root — sized so the G1's
// extreme left swing during motion just touches the arrow tip (never crosses).
const ARROW_END_OFFSET = 0.55;
// Duration that the kinematic-encoding plates take to fade in (drives stage-3 length)
const PLATE_FADE_DUR = 0.5;

const LIMBS = {
  torso: { color: '#8e8e93', bodies: ['pelvis','waist_yaw_link','waist_roll_link','torso_link'] },
  la:    { color: '#e74c3c', bodies: ['left_shoulder_pitch_link','left_shoulder_roll_link','left_shoulder_yaw_link','left_elbow_link','left_wrist_roll_link','left_wrist_pitch_link','left_wrist_yaw_link'] },
  ra:    { color: '#f39c12', bodies: ['right_shoulder_pitch_link','right_shoulder_roll_link','right_shoulder_yaw_link','right_elbow_link','right_wrist_roll_link','right_wrist_pitch_link','right_wrist_yaw_link'] },
  ll:    { color: '#27ae60', bodies: ['left_hip_pitch_link','left_hip_roll_link','left_hip_yaw_link','left_knee_link','left_ankle_pitch_link','left_ankle_roll_link'] },
  rl:    { color: '#2980b9', bodies: ['right_hip_pitch_link','right_hip_roll_link','right_hip_yaw_link','right_knee_link','right_ankle_pitch_link','right_ankle_roll_link'] },
};
const LIMB_LABEL = { torso: 'Torso / Waist', la: 'Left arm', ra: 'Right arm', ll: 'Left leg', rl: 'Right leg' };
const LIMB_FULL  = { torso: 'Torso',          la: 'Left Arm', ra: 'Right Arm', ll: 'Left Leg', rl: 'Right Leg' };

// Intra-limb connections to animate per limb (1-2 specific joint pairs)
const INTRA_CONNS = {
  torso: [['pelvis', 'torso_link']],
  la:    [['left_shoulder_pitch_link','left_elbow_link'], ['left_elbow_link','left_wrist_pitch_link']],
  ra:    [['right_shoulder_pitch_link','right_elbow_link'], ['right_elbow_link','right_wrist_pitch_link']],
  ll:    [['left_hip_pitch_link','left_knee_link'], ['left_knee_link','left_ankle_pitch_link']],
  rl:    [['right_hip_pitch_link','right_knee_link'], ['right_knee_link','right_ankle_pitch_link']],
};

// Inter-limb beats (literal limb-to-limb, per user direction)
const INTER_BEATS = [
  { key:'la-ra', limbs:['la','ra'], color:'#c94c8d', label:'L arm ↔ R arm',
    conns: [['left_shoulder_pitch_link','right_shoulder_pitch_link'],
            ['left_wrist_pitch_link','right_wrist_pitch_link']] },

// ─── G1 motion loader ───────────────────────────────────────────────────────
async function loadG1Motion(url, maxFrames=600) {
  const text = await fetch(url).then(r => { if (!r.ok) throw new Error(`CSV not found: ${url}`); return r.text(); });
  const parsed = Papa.parse(text, { header:true, skipEmptyLines:true, dynamicTyping:true });
  const rows = parsed.data;
  let frames = rows;
  const ratio = rows.length / maxFrames;
  if (rows.length > maxFrames) frames = Array.from({length: maxFrames}, (_,i) => rows[Math.round(i*ratio)]);
  const fps = 120 / (rows.length > maxFrames ? ratio : 1);
  const md = {
    numFrames: frames.length, frameTime: 1/fps, fps, duration: frames.length/fps,
    rootPos: new Float32Array(frames.length*3),
    rootQuat: new Float32Array(frames.length*4),
    joints: {},
  };
  Object.values(CSV_TO_JOINT).forEach(n => { md.joints[n] = new Float32Array(frames.length); });
  const e = new THREE.Euler(0,0,0,'ZYX'); const q = new THREE.Quaternion();
  for (let i = 0; i < frames.length; i++) {
    const r = frames[i];
    md.rootPos[i*3]   = (r['root_translateX']||0)*0.01;
    md.rootPos[i*3+1] = (r['root_translateY']||0)*0.01;
    md.rootPos[i*3+2] = (r['root_translateZ']||0)*0.01;
    e.set((r['root_rotateX']||0)*DEG2RAD, (r['root_rotateY']||0)*DEG2RAD, (r['root_rotateZ']||0)*DEG2RAD, 'ZYX');
    q.setFromEuler(e);
    md.rootQuat[i*4] = q.w; md.rootQuat[i*4+1] = q.x; md.rootQuat[i*4+2] = q.y; md.rootQuat[i*4+3] = q.z;
    for (const [c, jn] of Object.entries(CSV_TO_JOINT)) {
      if (r[c] !== undefined) md.joints[jn][i] = r[c] * DEG2RAD;
    }
  }
  return md;
}
async function loadVertsBin(url) {
  const buf = await fetch(url).then(r => { if(!r.ok) throw new Error(r.status+' '+url); return r.arrayBuffer(); });
  const dv = new DataView(buf);
  return { numFrames: dv.getUint32(0,true), numVerts: dv.getUint32(4,true), fps: dv.getFloat32(8,true), verts: new Float32Array(buf,12) };
}
async function loadFacesBin(url) {
  const buf = await fetch(url).then(r => { if(!r.ok) throw new Error(r.status+' '+url); return r.arrayBuffer(); });
  const dv = new DataView(buf);
  const n = dv.getUint32(0,true);
  return new Uint32Array(buf, 4, n*3);
}

// ─── G1 builder ─────────────────────────────────────────────────────────────
const stlLoader = new THREE.STLLoader();
function loadSTL(name) {
  if (stlGeomCache[name] !== undefined) return Promise.resolve(stlGeomCache[name]);
  return new Promise(resolve => {
    stlLoader.load(`./g1_engine/meshes/${name}.STL`,
      g => { g.computeVertexNormals(); stlGeomCache[name] = g; resolve(g); },
      undefined,
      () => { stlGeomCache[name] = null; resolve(null); }
    );
  });
}
function makeG1Material(rgba, meshName, opacityRef) {
  let color, metalness, roughness;
  if (meshName === 'head_link')          { color = new THREE.Color(0x0c0f14); metalness = 0.45; roughness = 0.30; }
  else if (rgba[0] < 0.4)                { color = new THREE.Color(0x111316); metalness = 0.55; roughness = 0.35; }
  else                                   { color = new THREE.Color(0xd8dce6); metalness = 0.15; roughness = 0.45; }
  const mat = new THREE.MeshStandardMaterial({ color, metalness, roughness, transparent:true, opacity: opacityRef.value, depthWrite: opacityRef.value >= 0.95 });
  opacityRef.materials.push(mat);
  return mat;
}
async function buildG1Robot({opacityRef={value:1.0, materials:[]}}={}) {
  const root = new THREE.Group();
  const yaw  = new THREE.Group();
  root.add(yaw);
  const robotWorld = new THREE.Group();
  robotWorld.rotation.x = -Math.PI/2;
  yaw.add(robotWorld);
  const bodies = modelData.bodies;
  const groupMap = {}, bodyGroups = {};
  for (const b of bodies) {
    const outer = new THREE.Group();
    outer.position.set(...b.pos);
    const bq = b.quat;
    outer.quaternion.set(bq[1], bq[2], bq[3], bq[0]);
    const inner = new THREE.Group();
    outer.add(inner);
    groupMap[b.name] = { outer, inner };
    bodyGroups[b.name] = inner;
  }
  let rootOuter = null;
  for (const b of bodies) {
    if (b.parent && groupMap[b.parent]) groupMap[b.parent].inner.add(groupMap[b.name].outer);
    else { robotWorld.add(groupMap[b.name].outer); rootOuter = groupMap[b.name].outer; }
  }
  const jobs = [];
  for (const b of bodies) {
    for (const m of b.meshes) {
      jobs.push(loadSTL(m.name).then(geo => {
        if (!geo) return;
        const mat = makeG1Material(m.rgba, m.name, opacityRef);
        const mq = m.quat;
        const obj = new THREE.Mesh(geo, mat);
        obj.position.set(...m.pos);
        obj.quaternion.set(mq[1], mq[2], mq[3], mq[0]);
        groupMap[b.name].inner.add(obj);
      }));
    }
  }
  await Promise.all(jobs);
  const _ax = new THREE.Vector3(); const _q = new THREE.Quaternion();
  function applyFrame(motion, fIdx) {
    if (!rootOuter) return;
    const N = motion.numFrames;
    const fi = (((fIdx % N) + N) % N) | 0;
    rootOuter.position.set(motion.rootPos[fi*3], motion.rootPos[fi*3+1], motion.rootPos[fi*3+2]);
    rootOuter.quaternion.set(motion.rootQuat[fi*4+1], motion.rootQuat[fi*4+2], motion.rootQuat[fi*4+3], motion.rootQuat[fi*4]);
    for (const b of bodies) {
      if (!b.joint || b.joint.type !== 'hinge') continue;
      const arr = motion.joints[b.joint.name];
      if (!arr) continue;
      _ax.set(...b.joint.axis);
      _q.setFromAxisAngle(_ax, arr[fi]);
      bodyGroups[b.name].quaternion.copy(_q);
    }
  }
  function getBodyWorldPos(name, out) {
    const g = bodyGroups[name]; if (!g) return null;
    g.updateWorldMatrix(true,false);
    out.setFromMatrixPosition(g.matrixWorld);
    return out;
  }
  function setOpacity(a) {
    opacityRef.value = a;
    for (const m of opacityRef.materials) { m.opacity = a; m.transparent = a < 1; m.depthWrite = a >= 0.95; }
  }
  return { object3D: root, bodyGroups, applyFrame, getBodyWorldPos, setOpacity, opacityRef };
}

// ─── SMPL builder ───────────────────────────────────────────────────────────
function buildSMPL(vd, faces) {
  const numVerts = vd.numVerts, numFrames = vd.numFrames;
  const geo = new THREE.BufferGeometry();
  const posAttr = new THREE.BufferAttribute(new Float32Array(numVerts*3), 3);
  geo.setAttribute('position', posAttr);
  geo.setIndex(new THREE.BufferAttribute(faces, 1));
  // Phong gives a more natural skin look than Standard on this scene
  const mat = new THREE.MeshPhongMaterial({
    color: new THREE.Color(0.94, 0.71, 0.55),
    specular: 0x442211,
    shininess: 18,
    transparent: true, opacity: 1.0, side: THREE.DoubleSide,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  posAttr.array.set(vd.verts.subarray(0, numVerts*3));
  posAttr.needsUpdate = true;
  geo.computeVertexNormals();
  const frameMin = new Float32Array(numFrames);
  for (let fi = 0; fi < numFrames; fi++) {
    const base = fi*numVerts*3; let mn = Infinity;
    for (let j = 1; j < numVerts*3; j += 3) { const y = vd.verts[base+j]; if (y < mn) mn = y; }
    frameMin[fi] = mn;
  }
  const sorted = Array.from(frameMin).sort((a,b)=>a-b);
  const p10 = sorted[Math.floor(numFrames*0.10)];
  mesh.position.y = -p10;
  const wrap = new THREE.Group();
  wrap.add(mesh);
  function applyFrame(fIdx) {
    const N = numFrames;
    const fi = (((fIdx % N) + N) % N) | 0;
    posAttr.array.set(vd.verts.subarray(fi*numVerts*3, fi*numVerts*3+numVerts*3));
    posAttr.needsUpdate = true;
    geo.computeVertexNormals();
  }
  function setOpacity(a){ mat.opacity = a; mat.transparent = a < 1; mat.depthWrite = a >= 0.95; }
  return { object3D: wrap, mesh, mat, applyFrame, setOpacity, numFrames, numVerts };
}

const SPARK_LEN = 70;
function tickSparkBuffers(fIdx) {
  const N = g1Motion.numFrames;
  const wrap = i => ((i % N) + N) % N;
  const fi  = wrap(fIdx | 0);
  const fp  = wrap(fi - 1);
  const fpp = wrap(fi - 2);
  for (const J of PICKED_JOINTS) {
    const arr = g1Motion.joints[J.joint];
    if (!arr) continue;
    const buf = sparkBuffers[J.body];
    buf.pos.push(arr[fi]);                        if (buf.pos.length > SPARK_LEN) buf.pos.shift();
    buf.vel.push(arr[fi] - arr[fp]);              if (buf.vel.length > SPARK_LEN) buf.vel.shift();
    buf.acc.push(arr[fi] - 2*arr[fp] + arr[fpp]); if (buf.acc.length > SPARK_LEN) buf.acc.shift();
  }
}

function renderPlateSparklines() {
  for (const J of PICKED_JOINTS) {
    const el = plates[J.body];
    if (!el) continue;
    const velCanvas = el.querySelector('canvas[data-feature="velocity"]');
    const accCanvas = el.querySelector('canvas[data-feature="accel"]');
    if (velCanvas) drawSpark(velCanvas, sparkBuffers[J.body].vel, PLATE_DEFS.vel.color);
    if (accCanvas) drawSpark(accCanvas, sparkBuffers[J.body].acc, PLATE_DEFS.acc.color);
  }
}
function drawSpark(canvas, buf, color) {
  const w = canvas.width = canvas.clientWidth * (window.devicePixelRatio || 1);
  const h = canvas.height = canvas.clientHeight * (window.devicePixelRatio || 1);
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,w,h);
  if (buf.length < 2) return;
  let mn = Infinity, mx = -Infinity;
  for (const v of buf) { if (v<mn)mn=v; if (v>mx)mx=v; }
  if (mx - mn < 1e-6) { mn -= 0.01; mx += 0.01; }
  ctx.strokeStyle = '#e9ecf3'; ctx.lineWidth = 1 * (window.devicePixelRatio || 1);
  ctx.beginPath(); ctx.moveTo(0, h/2); ctx.lineTo(w, h/2); ctx.stroke();
  ctx.strokeStyle = color; ctx.lineWidth = 1.8 * (window.devicePixelRatio || 1);
  ctx.beginPath();
  for (let i = 0; i < buf.length; i++) {
    const x = (i / (SPARK_LEN - 1)) * w;
    const y = h - ((buf[i] - mn) / (mx - mn)) * (h - 4) - 2;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
  if (buf.length > 0) {
    const xT = ((buf.length - 1) / (SPARK_LEN - 1)) * w;
    const yT = h - ((buf[buf.length-1] - mn)/(mx-mn))*(h-4) - 2;
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(xT, yT, 2.6 * (window.devicePixelRatio || 1), 0, Math.PI*2); ctx.fill();
  }
}

// ─── Limb ellipses + animated edges (SVG) ───────────────────────────────────
function setupLimbEllipses() {
  const gLimbs = document.getElementById('g-limbs');
  gLimbs.innerHTML = '';
  for (const [key, L] of Object.entries(LIMBS)) {
    const ell = svg('ellipse', {
      class: 'svg-ellipse',
      stroke: L.color,
      cx: 0, cy: 0, rx: 0, ry: 0,
    });
    ell.setAttribute('data-limb', key);
    gLimbs.appendChild(ell);
    svgLimbs[key] = ell;
  }
}
function setLimbEllipseVisible(key, on, color) {
  const ell = svgLimbs[key];
  if (!ell) return;
  ell.style.opacity = on ? 1 : 0;
  if (color) ell.setAttribute('stroke', color);
}
function updateLimbEllipses() {
  for (const [key, L] of Object.entries(LIMBS)) {
    const ell = svgLimbs[key];
    if (!ell || ell.style.opacity == 0) continue;
    // Compute bounding box of all joint screen positions in this limb (on the GRAPH G1)
    let mnX=Infinity, mnY=Infinity, mxX=-Infinity, mxY=-Infinity, cnt=0;
    for (const bn of L.bodies) {
      const p = jointScreenGraph(bn);
      if (!p) continue;
      cnt++;
      if (p.x<mnX)mnX=p.x; if (p.x>mxX)mxX=p.x;
      if (p.y<mnY)mnY=p.y; if (p.y>mxY)mxY=p.y;
    }
    if (cnt < 2) continue;
    const pad = 16;
    const cx = (mnX + mxX) / 2;
    const cy = (mnY + mxY) / 2;
    const rx = Math.max(28, (mxX - mnX)/2 + pad);
    const ry = Math.max(34, (mxY - mnY)/2 + pad);
    ell.setAttribute('cx', cx.toFixed(1));
    ell.setAttribute('cy', cy.toFixed(1));
    ell.setAttribute('rx', rx.toFixed(1));
    ell.setAttribute('ry', ry.toFixed(1));
  }
}

// ─── Active connections (animated SVG lines that draw between joints) ──────
let activeConns = [];     // array of {a, b, color, line, startedAt}
function clearConns() {
  const g = document.getElementById('g-conns');
  g.innerHTML = '';
  activeConns = [];
}
function setConns(pairs, color) {
  clearConns();
  const g = document.getElementById('g-conns');
  for (const [a, b] of pairs) {
    const line = svg('line', { class:'svg-conn', stroke: color, 'stroke-dasharray': '8 6' });
    g.appendChild(line);
    activeConns.push({ a, b, color, line, startedAt: masterClock });
  }
}
function updateConns() {
  const ts = masterClock;
  for (const c of activeConns) {
    const pa = jointScreenGraph(c.a), pb = jointScreenGraph(c.b);
    if (!pa || !pb) continue;
    c.line.setAttribute('x1', pa.x.toFixed(1));
    c.line.setAttribute('y1', pa.y.toFixed(1));
    c.line.setAttribute('x2', pb.x.toFixed(1));
    c.line.setAttribute('y2', pb.y.toFixed(1));
    // Animate dash flow
    const off = -((ts - c.startedAt) * 50) % 14;
    c.line.setAttribute('stroke-dashoffset', off.toFixed(1));
    // Fade in/out over a 2.5s lifecycle
    const lt = ts - c.startedAt;
    const op = Math.min(1, lt / 0.5) * (1 - Math.max(0, (lt - 2.0) / 0.5));
    c.line.style.opacity = Math.max(0, Math.min(1, op));
  }
}

const RING_R = 12;        // small focus circle radius
const PLATE_HALF_W = 65;  // half-width of a combined data-plate (matches CSS width 130)
const PLATE_HALF_H = 40;  // approx half-height (header + 2 graph rows)

// ─── Per-frame: position rings, combined plates, leader arrows ────────────
function updateFocusRings() {
  for (const J of PICKED_JOINTS) {
    const js = jointScreen(J.body);
    if (!js) continue;

    // Ring on the joint
    const ring = document.querySelector(`.svg-focus-ring[data-body="${J.body}"]`);
    if (ring) {
      ring.setAttribute('cx', js.x.toFixed(1));
      ring.setAttribute('cy', js.y.toFixed(1));
      ring.setAttribute('r',  RING_R);
    }

    // Plate
    const plate = plates[J.body];
    if (!plate) continue;
    let px = js.x + J.dx;
    const py = js.y + J.dy;
    // Hard clamp: plate's left edge must clear the retarget label's right edge
    // (label is the rightmost element in the human-side region).
    const arrowEndX = getRetargetArrowEndPx().x;
    const minPlateLeft = Math.max(arrowEndX + 14, getRetargetLabelRightPx() + 4);
    if (px - PLATE_HALF_W < minPlateLeft) px = minPlateLeft + PLATE_HALF_W;
    plate.style.left = px.toFixed(1) + 'px';
    plate.style.top  = py.toFixed(1) + 'px';

    // Leader arrow joint → plate (stop at plate's near edge)
    const leader = document.querySelector(`.svg-leader[data-body="${J.body}"]`);
    if (!leader) continue;
    const dxv = px - js.x, dyv = py - js.y;
    const len = Math.hypot(dxv, dyv) || 1;
    const ux = dxv / len, uy = dyv / len;
    const sx = js.x + ux * (RING_R + 2);
    const sy = js.y + uy * (RING_R + 2);
    const ax = Math.abs(ux), ay = Math.abs(uy);
    const tEdgeX = (PLATE_HALF_W + 4) / Math.max(ax, 1e-6);
    const tEdgeY = (PLATE_HALF_H + 4) / Math.max(ay, 1e-6);
    const tEdge = Math.min(tEdgeX, tEdgeY);
    const tx = px - ux * tEdge;
    const ty = py - uy * tEdge;
    leader.setAttribute('x1', sx.toFixed(1));
    leader.setAttribute('y1', sy.toFixed(1));
    leader.setAttribute('x2', tx.toFixed(1));
    leader.setAttribute('y2', ty.toFixed(1));
  }
}

// ─── Kinematic encoding rectangle ───────────────────────────────────────────
function setEncRectVisible(on) {
  const r = document.getElementById('enc-rect');
  r.style.opacity = on ? 0.85 : 0;
  if (on) show('enc-label'); else hide('enc-label');
}
function updateEncRect() {
  const r = document.getElementById('enc-rect');
  if (r.style.opacity == 0) return;
  // Bounding box covers G1 silhouette + the combined plates (not the human)
  let mnX=Infinity, mnY=Infinity, mxX=-Infinity, mxY=-Infinity;
  for (const b of modelData.bodies) {
    const p = jointScreen(b.name);
    if (!p) continue;
    if (p.x<mnX)mnX=p.x; if (p.x>mxX)mxX=p.x;
    if (p.y<mnY)mnY=p.y; if (p.y>mxY)mxY=p.y;
  }
  for (const J of PICKED_JOINTS) {
    const plate = plates[J.body];
    if (!plate) continue;
    const left = parseFloat(plate.style.left);
    const top  = parseFloat(plate.style.top);
    if (!isFinite(left) || !isFinite(top)) continue;
    const x0 = left - PLATE_HALF_W, y0 = top - PLATE_HALF_H;
    const x1 = left + PLATE_HALF_W, y1 = top + PLATE_HALF_H;
    if (x0<mnX)mnX=x0; if (x1>mxX)mxX=x1;
    if (y0<mnY)mnY=y0; if (y1>mxY)mxY=y1;
  }
  const padX = 22, padY = 28;
  let x = mnX - padX, y = mnY - padY;
  let w = (mxX - mnX) + padX*2;
  const h = (mxY - mnY) + padY*2;
  // Clamp: enc-rect's left edge must JUST TOUCH the retarget label's right edge
  // (and never extend left of it, never cross the arrow).
  const arrowEnd = getRetargetArrowEndPx();
  const labelRight = getRetargetLabelRightPx();
  const minLeft  = Math.max(arrowEnd.x + 14, labelRight + 4);
  if (x < minLeft) { w -= (minLeft - x); x = minLeft; }
  r.setAttribute('x', x.toFixed(1));
  r.setAttribute('y', y.toFixed(1));
  r.setAttribute('width', Math.max(0, w).toFixed(1));
  r.setAttribute('height', Math.max(0, h).toFixed(1));
  const label = document.getElementById('enc-label');
  label.style.left = (x + w/2).toFixed(1) + 'px';
  label.style.top  = (y - 6).toFixed(1) + 'px';
}

function setGraphRectVisible(on) {

function updateGraphRect() {
  const r = document.getElementById('graph-rect');
  if (r.style.opacity == 0) return;
  let mnX=Infinity, mnY=Infinity, mxX=-Infinity, mxY=-Infinity;
  for (const b of modelData.bodies) {
    const p = jointScreenGraph(b.name);
    if (!p) continue;
    if (p.x<mnX)mnX=p.x; if (p.x>mxX)mxX=p.x;

  }
  const bi = document.getElementById('beat-indicator');
  if (bi && bi.classList.contains('visible')) {
    const biLeft = parseFloat(bi.style.left);
    const biTop  = parseFloat(bi.style.top);
    if (isFinite(biLeft) && isFinite(biTop)) {
      const halfW = 110, halfH = 14;
      if (biLeft - halfW < mnX) mnX = biLeft - halfW;
      if (biLeft + halfW > mxX) mxX = biLeft + halfW;
      if (biTop  + halfH > mxY) mxY = biTop + halfH;
    }
  }
  const padX = 28, padY = 28;
  let x = mnX - padX;

  let y = mnY - padY;

      if (x < minLeft) x = minLeft;

  let w = (mxX - mnX) + padX*2;
  if (mxX + padX < x + w) w = (mxX + padX) - x;   // re-derive width if x got clamped

// ─── Embedding strip rendering ─────────────────────────────────────────────
const Z_CELLS = 64;        // visible segmented blocks (representative of full Z ∈ ℝ²⁵⁶)
function drawEmbedding(seed) {
  const c = document.getElementById('embedding-canvas');
  const w = c.width = c.clientWidth * (window.devicePixelRatio || 1);
  const h = c.height = c.clientHeight * (window.devicePixelRatio || 1);
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,w,h);
  const ch = h / Z_CELLS;     // vertical layout — cells stack top-to-bottom
  for (let i = 0; i < Z_CELLS; i++) {
    const v = 0.5*Math.abs(Math.sin(i*0.713 + seed*0.012))
            + 0.5*Math.abs(Math.cos(i*0.281 + seed*0.0078));
    const r = Math.round(44 + v*200);
    const g = Math.round(62 + v*80);
    const b = Math.round(107 + v*80);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(0, i*ch, w, Math.ceil(ch+0.5));
  }
  // subtle dividers between segments
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  for (let i = 1; i < Z_CELLS; i++) {
    ctx.fillRect(0, i*ch - 0.5, w, 0.5);
  }
}

    { name:'kinematic', duration: PLATE_FADE_DUR + 0.05,
      enter() {

      },

    // 4: Graph convolution — just kicks off the continuous beat tick.
    //    The actual limb beats are driven by tickGraphBeats so they keep
    //    looping even after stage 5 has started.

        setGraphRectVisible(true);

    { name:'temporal', duration: 1.0,
      enter() {

        show('lbl-spatial');

// ─── Continuous limb-beat tick (runs after stage 4 starts; loops forever) ──
function tickGraphBeats(localT) {
  // One-shot fade-in of graph G1
  if (g1Graph) g1Graph.setOpacity(clamp(localT / 1.0, 0, 1));

  const limbOrder = ['torso','la','ra','ll','rl'];
  const INTRA_BEAT_DUR = 2.8;
  const INTRA_DUR      = limbOrder.length * INTRA_BEAT_DUR;
  const INTER_BEAT_DUR = 3.0;
  const INTER_DUR      = INTER_BEATS.length * INTER_BEAT_DUR;
  const CYCLE_DUR      = INTRA_DUR + INTER_DUR;

  const t = ((localT % CYCLE_DUR) + CYCLE_DUR) % CYCLE_DUR;
  if (t < INTRA_DUR) {
    const idx = clamp(Math.floor(t / INTRA_BEAT_DUR), 0, limbOrder.length - 1);
    const within = (t - idx * INTRA_BEAT_DUR) / INTRA_BEAT_DUR;
    for (const k of limbOrder) setLimbEllipseVisible(k, false);
    setLimbEllipseVisible(limbOrder[idx], true, LIMBS[limbOrder[idx]].color);
    if (within < 0.03 && (!activeConns.length || activeConns[0]._beatIdx !== idx || activeConns[0]._mode !== 'intra')) {
      setConns(INTRA_CONNS[limbOrder[idx]] || [], LIMBS[limbOrder[idx]].color);
      for (const c of activeConns) { c._beatIdx = idx; c._mode = 'intra'; }
    }
    setBeat('intra', limbOrder[idx], limbOrder[idx]);
  } else {
    const t2 = t - INTRA_DUR;
    const idx = clamp(Math.floor(t2 / INTER_BEAT_DUR), 0, INTER_BEATS.length - 1);
    const within = (t2 - idx * INTER_BEAT_DUR) / INTER_BEAT_DUR;
    const beat = INTER_BEATS[idx];
    for (const k of Object.keys(LIMBS)) setLimbEllipseVisible(k, false);
    for (const l of beat.limbs) setLimbEllipseVisible(l, true, beat.color);
    if (within < 0.03 && (!activeConns.length || activeConns[0]._beatIdx !== idx || activeConns[0]._mode !== 'inter')) {
      setConns(beat.conns, beat.color);
      for (const c of activeConns) { c._beatIdx = idx; c._mode = 'inter'; }
    }
    setBeat('inter', beat.limbs[0], beat.limbs[1]);
  }
}

// ─── Continuous temporal tick (runs after stage 5 starts; holds final state) ──
function tickTemporalAnim(t) {
  if (t < 4.5) {
    hide('aggregate-icon');
    g1Aggregate.setOpacity(0);
    for (let k = 0; k < g1Ghosts.length; k++) {
      const start = k * 0.7;
      const u = clamp((t - start) / 0.9, 0, 1);
      const decay = 0.85 - k * 0.10;
      g1Ghosts[k].robot.setOpacity(u * decay);
      g1Ghosts[k].robot.object3D.position.x = g1Ghosts[k].baseX;
    }
  } else if (t < 6.5) {
    for (let k = 0; k < g1Ghosts.length; k++) {
      const decay = 0.85 - k * 0.10;
      g1Ghosts[k].robot.setOpacity(decay);
      g1Ghosts[k].robot.object3D.position.x = g1Ghosts[k].baseX;
    }
    show('aggregate-icon');
    g1Aggregate.setOpacity(0);
  } else if (t < 9.0) {
    const u = clamp((t - 6.5) / 2.3, 0, 1);
    const eased = u * u;
    for (let k = 0; k < g1Ghosts.length; k++) {
      const decay = 0.85 - k * 0.10;
      g1Ghosts[k].robot.object3D.position.x = lerp(g1Ghosts[k].baseX, SLOT_X.spatial, eased);
      g1Ghosts[k].robot.setOpacity(Math.max(0, (1 - eased) * decay));
    }
    g1Aggregate.setOpacity(easeInOut(u));
    const ic = document.getElementById('aggregate-icon');
    ic.style.opacity = String(1 - eased * 0.6);
  } else {
    for (const g of g1Ghosts) g.robot.setOpacity(0);
    g1Aggregate.setOpacity(1.0);
    hide('aggregate-icon');
  }
}

function transitionToStage(i) {
  if (i === stageIdx) return;
  if (stageIdx >= 0 && stages[stageIdx] && stages[stageIdx].exit) stages[stageIdx].exit();
  stageIdx = i;
  stageStart = masterClock;
  if (i >= 0 && i < stages.length) {
    setBadge(i+1, stages.length);
    if (stages[i].enter) stages[i].enter();
  }
}
function endWalkthrough() {
  walkthroughEnded = true;
  document.getElementById('replay-btn').classList.add('visible');
}
function restartWalkthrough() {
  masterClock = 0; stageIdx = -1; walkthroughEnded = false;
  document.getElementById('replay-btn').classList.remove('visible');
  hide('lbl-human'); hide('lbl-spatial');
  hide('enc-label'); hide('graph-label');
  hide('embedding-strip');
  hide('aggregate-icon');
  hide('retarget-label');
  setRetargetVisible(false);
  setGraphRectVisible(false);
  setHumanRectVisible(false);
  setEncRectVisible(false);
  setFocusOpacity(0);
  for (const k of Object.keys(LIMBS)) setLimbEllipseVisible(k, false);
  clearConns();
  document.getElementById('beat-indicator').classList.remove('visible');
  graphAnimStart = -1;
  temporalAnimStart = -1;
  if (g1Aggregate) g1Aggregate.setOpacity(0);
  if (g1Graph)     g1Graph.setOpacity(0);
  setEncRectVisible(false);
  setFocusOpacity(0);
  clearConns();
  for (const k of Object.keys(LIMBS)) setLimbEllipseVisible(k, false);
  document.getElementById('beat-indicator').classList.remove('visible');
  g1Main.setOpacity(0.0);
  smplGroup.setOpacity(0.0);
  for (const g of g1Ghosts) g.robot.setOpacity(0);
  setTimeout(() => smplGroup.setOpacity(1.0), 40);
  transitionToStage(0);
}

// ─── Activity dropdown / demo switch ────────────────────────────────────────
function buildActivityDropdown() {
  const sel = document.getElementById('activity-dropdown');
  sel.innerHTML = '';
  for (const d of demosConfig.demos) {
    const o = document.createElement('option');
    o.value = d.id; o.textContent = d.label;
    if (d.id === currentDemo.id) o.selected = true;
    sel.appendChild(o);
  }
  sel.addEventListener('change', async () => {
    const newDemo = demosConfig.demos.find(x => x.id === sel.value);
    if (!newDemo || newDemo.id === currentDemo.id) return;
    await switchDemo(newDemo);
  });
}
async function switchDemo(demo) {
  showLoading(`Loading ${demo.label}…`);
  try {
    const [m, vd] = await Promise.all([
      loadG1Motion(`./assets/demos/g1_csv/${demo.id}.csv`, 600),
      loadVertsBin(withV(`./assets/demos/smpl/${demo.id}_gt.bin`)),
    ]);
    g1Motion = m;
    smplGroup.object3D.parent.remove(smplGroup.object3D);
    smplData = vd;
    smplGroup = buildSMPL(vd, smplFaces);
    smplGroup.object3D.position.set(SLOT_X.human, 0, 0);
    scene.add(smplGroup.object3D);
    currentDemo = demo;
    computeROM();
    restartWalkthrough();
  } catch (err) {
    console.error(err); showError(err.message);
  } finally {
    hideLoading();
  }
}
function capitalize(s){return s ? s[0].toUpperCase()+s.slice(1) : s;}

// ─── Main loop ──────────────────────────────────────────────────────────────
function loop(ts) {
  requestAnimationFrame(loop);
  if (lastTS === null) lastTS = ts;
  const dt = (ts - lastTS) * 0.001;
  lastTS = ts;
  masterClock += dt;

  if (smplData && smplGroup.mat.opacity > 0.01) {
    const f = (masterClock * smplData.fps) % smplData.numFrames;
    smplGroup.applyFrame(f);
  }
  if (g1Motion) {
    const fG1 = (masterClock * g1Motion.fps) % g1Motion.numFrames;
    g1Main.applyFrame(g1Motion, fG1);
    if (g1Aggregate) g1Aggregate.applyFrame(g1Motion, fG1);
    if (g1Graph)     g1Graph.applyFrame(g1Motion, fG1);
    for (const g of g1Ghosts) g.robot.applyFrame(g1Motion, fG1 - g.lagFrames);

    // Maintain sparkline buffers from stage 3 onward (so plates show data when revealed)
    if (stageIdx >= 2) {
      tickSparkBuffers(fG1);
      renderPlateSparklines();
      renderROMFans(fG1);
      updateFocusRings();
      updateEncRect();
    }
    // Limb ellipses & connections: stage 4
    if (stageIdx >= 3) {
      updateLimbEllipses();
      updateConns();
    }
    // Embedding strip: stage 6 or after end
    if (stageIdx >= 5 || walkthroughEnded) {
      drawEmbedding(fG1);
    }
  }

  positionSlotLabels();
  positionAggregateIcon();
  positionBeatIndicator();
  positionRetargetArrow();
  updateHumanRect();
  updateGraphRect();
  if (graphAnimStart    >= 0) tickGraphBeats(masterClock - graphAnimStart);
  if (temporalAnimStart >= 0) tickTemporalAnim(masterClock - temporalAnimStart);

  if (stageIdx >= 0 && stageIdx < stages.length) {
    const t = masterClock - stageStart;
    const s = stages[stageIdx];
    if (s.update) s.update(t);
    if (t >= s.duration) {
      if (stageIdx === stages.length - 1) { endWalkthrough(); stageIdx = stages.length; }
      else transitionToStage(stageIdx + 1);
    }
  }

  renderer.render(scene, camera);
}

// ─── Boot ───────────────────────────────────────────────────────────────────
async function boot() {
  showLoading('Loading config…');
  demosConfig = await fetchJSON('./assets/demos/demos_config.json');
  currentDemo = demosConfig.demos.find(d => d.id === DEFAULT_DEMO) || demosConfig.demos[0];

  setStatus('Loading G1 model…');
  modelData = await fetchJSON('./g1_engine/model/g1_model.json');

  setStatus('Loading motion + mesh data…');
  const [g1m, vd, faces] = await Promise.all([
    loadG1Motion(`./assets/demos/g1_csv/${currentDemo.id}.csv`, 600),
    loadVertsBin(withV(`./assets/demos/smpl/${currentDemo.id}_gt.bin`)),
    loadFacesBin('./assets/demos/smpl/faces.bin'),
  ]);
  g1Motion = g1m; smplData = vd; smplFaces = faces;
  computeROM();

  setStatus('Building scene…');
  setupScene();

  setStatus('Building SMPL human…');
  smplGroup = buildSMPL(vd, faces);
  smplGroup.object3D.position.set(SLOT_X.human, 0, 0);
  scene.add(smplGroup.object3D);

  setStatus('Building G1 robot (meshes)…');
  g1Main = await buildG1Robot();
  g1Main.object3D.position.set(SLOT_X.robot, 0, 0);
  g1Main.object3D.scale.setScalar(1.3);   // scale up to roughly match SMPL height
  scene.add(g1Main.object3D);

  setStatus('Building aggregate G1 (right slot)…');
  g1Aggregate = await buildG1Robot();
  g1Aggregate.object3D.position.set(SLOT_X.spatial, 0, 0);
  g1Aggregate.object3D.scale.setScalar(1.3);
  g1Aggregate.setOpacity(0);
  scene.add(g1Aggregate.object3D);

  setStatus('Building graph-conv G1 (middle slot)…');
  g1Graph = await buildG1Robot();
  g1Graph.object3D.position.set(SLOT_X.graph, 0, 0);
  g1Graph.object3D.scale.setScalar(1.3);
  g1Graph.setOpacity(0);
  scene.add(g1Graph.object3D);

  setStatus('Building ghost stack…');
  await buildGhosts(5);

  setStatus('Wiring overlays…');
  setupFocusRingsAndPlates();
  setupLimbEllipses();
  buildActivityDropdown();

  document.getElementById('replay-btn').addEventListener('click', restartWalkthrough);

  defineStages();
  hideLoading();
  restartWalkthrough();
  requestAnimationFrame(loop);
}

boot().catch(err => {
  hideLoading();
  console.error(err);
  showError(err.message);
});
</script>
